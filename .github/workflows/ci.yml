name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=$(pwd)" >> $GITHUB_ENV

      - name: Compile project
        run: |
          python -m py_compile backend/app.py backend/config.py backend/services/parser_excel.py backend/services/parser_pdf.py backend/services/qa_service.py backend/services/validator.py frontend/app.py

      - name: Run tests
        run: pytest
